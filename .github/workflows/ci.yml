name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install backend deps
        run: npm ci

      - name: Install frontend deps
        run: npm ci --prefix frontend

      - name: Audit production dependencies
        run: npm run audit:prod

      - name: Audit frontend production dependencies
        run: npm run audit:frontend:prod

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (backend, extension, and action helpers)
        run: npm test -- --ci

      - name: Coverage gate (backend >= 90%)
        run: >-
          npx jest --coverage --ci
          --coverageThreshold='{"global":{"statements":90,"functions":90,"lines":90}}'

      - name: Test (frontend)
        run: npm run --prefix frontend test -- --watch=false --browsers=ChromeHeadless

      - name: Build backend
        run: npm run build:backend

      - name: Smoke PR impact action logic
        run: npm run smoke:action

      - name: Build frontend
        run: npm run build:frontend

  runtime-compat:
    name: Runtime compatibility
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test backend
        run: npm test -- --ci --runInBand

      - name: Build backend
        run: npm run build:backend

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: git-history-ui:ci

      - name: Smoke test mounted repository and authentication
        shell: bash
        run: |
          repo="$(mktemp -d)"
          trap 'docker rm -f git-history-ui-ci >/dev/null 2>&1 || true; rm -rf "$repo"' EXIT
          git -C "$repo" init -q -b main
          git -C "$repo" config user.name "CI"
          git -C "$repo" config user.email "ci@example.com"
          echo "smoke" > "$repo/README.md"
          git -C "$repo" add README.md
          git -C "$repo" commit -q -m "test: docker smoke"
          chmod -R a+rX "$repo"

          docker run -d --name git-history-ui-ci \
            -p 127.0.0.1:3000:3000 \
            -e GIT_HISTORY_UI_TOKEN=ci-secret \
            -v "$repo:/repo:ro" \
            git-history-ui:ci

          for attempt in {1..30}; do
            if curl --fail --silent --user ignored:ci-secret \
              "http://127.0.0.1:3000/api/health" >/dev/null; then
              ready=1
              break
            fi
            sleep 1
          done
          test "${ready:-}" = 1

          status="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            "http://127.0.0.1:3000/api/commits")"
          test "$status" = 401
          curl --fail --silent --user ignored:ci-secret \
            "http://127.0.0.1:3000/api/commits?pageSize=1" >/dev/null
