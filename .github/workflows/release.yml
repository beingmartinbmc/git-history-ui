name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install backend deps
        run: npm ci

      - name: Install frontend deps
        run: npm ci --prefix frontend

      - run: npm run audit:prod
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --ci
      - name: Coverage gate (backend >= 90%)
        run: >-
          npx jest --coverage --ci
          --coverageThreshold='{"global":{"statements":90,"functions":90,"lines":90}}'
      - name: Test frontend
        run: npm run --prefix frontend test -- --watch=false --browsers=ChromeHeadless
      - run: npm run build

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_TOKEN }}

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: publish-npm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
