name: Bug report
description: Report something that is broken or unexpected
title: 'fix: '
labels: ['bug', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for us to reproduce it.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: 'Running `npx git-history-ui` in a large repo...'
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: List the exact steps and commands.
      placeholder: |
        1. Go to a git repo
        2. Run `npx git-history-ui@latest`
        3. Click ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include logs, screenshots, or stack traces if available.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: git-history-ui version
      description: Run `npx git-history-ui@latest --version`.
      placeholder: '4.0.1'
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Run `node --version`.
      placeholder: 'v20.19.0'
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else we should know? Repo size, shell, browser, terminal logs, etc.
